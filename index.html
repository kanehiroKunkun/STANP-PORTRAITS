<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My ZINE</title>
    <style>
        body {
            margin: 0;
            background-color: #f4f4f4;
            font-family: sans-serif;
        }

        /* --- スマホ用（縦スクロール） --- */
        #mobile-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px 0;
        }
        #mobile-view img {
            max-width: 95%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background: white;
        }

        /* --- PC・iPad用（見開き＆クリック） --- */
        #desktop-view {
            display: none; /* 初期状態は非表示 */
            height: 100vh;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }
        
        /* 右綴じ（右から左へ読む）レイアウト */
        .spread-container {
            display: flex;
            flex-direction: row-reverse; 
            justify-content: center;
            align-items: center;
            height: 100%;
            gap: 2px;
        }

        .spread-container img {
            max-width: 48vw;
            max-height: 95vh;
            object-fit: contain;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            background: white;
        }

        /* 画面幅が768px以上（iPad・PC）のときの切り替え */
        @media (min-width: 768px) {
            #mobile-view { display: none; }
            #desktop-view { display: block; }
        }

        /* 操作ヒント */
        .hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #888;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="mobile-view"></div>

    <div id="desktop-view">
        <div class="spread-container" id="spread-container"></div>
        <div class="hint">← 左クリックで進む ｜ 右クリックで戻る →</div>
    </div>

<script>
    // ⚠️【重要】アップロードしたSVGのファイル名と完全に一致させてください
    const pages = [
        "images/logo_test.svg",
        "images/編集後記.png",
        "images/前書き.png",
    ];

    // --- スマホ用の画像読み込み（すべて縦に並べる） ---
    const mobileView = document.getElementById('mobile-view');
    pages.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.alt = "ZINE page";
        mobileView.appendChild(img);
    });

    // --- PC・iPad用の見開き処理 ---
    let currentIndex = 0;
    const desktopView = document.getElementById('desktop-view');
    const spreadContainer = document.getElementById('spread-container');

    function renderSpread() {
        spreadContainer.innerHTML = '';
        
        // 1枚目（右側に表示される）
        if (pages[currentIndex]) {
            const img1 = document.createElement('img');
            img1.src = pages[currentIndex];
            spreadContainer.appendChild(img1);
        }
        // 2枚目（左側に表示される）
        if (pages[currentIndex + 1]) {
            const img2 = document.createElement('img');
            img2.src = pages[currentIndex + 1];
            spreadContainer.appendChild(img2);
        }
    }

    // クリックでのページめくり処理
    desktopView.addEventListener('click', (e) => {
        const width = desktopView.offsetWidth;
        const clickX = e.clientX;

        if (clickX > width / 2) {
            // 画面の右側をクリック：1ページ前（戻る）
            if (currentIndex > 0) {
                currentIndex -= 2; // 見開きなので2ページ分戻る
                if (currentIndex < 0) currentIndex = 0;
                renderSpread();
            }
        } else {
            // 画面の左側をクリック：1ページ先（進む）
            if (currentIndex + 2 < pages.length) {
                currentIndex += 2; // 見開きなので2ページ分進む
                renderSpread();
            }
        }
    });

    // 初回表示
    renderSpread();
</script>

</body>
</html>
